version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "No build required for static files"
    build:
      commands:
        - echo "Static site deployment"
  artifacts:
    baseDirectory: .
    files:
      - '**/*'
      - '!node_modules/**/*'
      - '!src/**/*'
      - '!tailwind.config.js'
      - '!package.json'
      - '!package-lock.json'
  cache:
    paths: []